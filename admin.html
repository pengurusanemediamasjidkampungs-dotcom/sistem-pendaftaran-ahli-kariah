<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Pengurusan Nazir - MKSLB</title>
    <link rel="icon" type="image/png" href="logo_masjid.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              masjidGreen: '#006400',
              masjidGold: '#FFD700',
              masjidDark: '#004d00',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
      body { font-family: 'Poppins', sans-serif; }
      .tab-active {
        border-bottom: 3px solid #FFD700;
        color: #FFD700;
        font-weight: 700;
      }
      /* Custom scrollbar for table */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">
    
    <!-- Navbar -->
    <nav class="bg-masjidGreen text-white p-4 shadow-md sticky top-0 z-50">
      <div class="container mx-auto flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-3">
          <img src="logo_masjid.png" alt="MKSLB" class="h-10 w-auto brightness-0 invert" onerror="this.src='https://via.placeholder.com/40x40?text=MKSLB'">
          <div class="leading-tight">
            <span class="block text-[10px] uppercase tracking-widest opacity-80">Panel Pentadbiran</span>
            <span class="block font-bold text-sm">Masjid Kampung Sungai Lang Baru</span>
          </div>
        </a>
        <div class="flex items-center space-x-4 text-xs font-bold uppercase">
          <a href="index.html" class="hover:text-masjidGold transition hidden md:block">Utama</a>
          <button onclick="location.reload()" class="bg-white/10 hover:bg-white/20 p-2 rounded-lg transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
      
      <!-- Dashboard Stats -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-masjidGreen">
          <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Jumlah Permohonan</p>
          <h3 class="text-3xl font-black text-gray-800" id="stat-total">--</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-masjidGold">
          <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Kariah Berdaftar</p>
          <h3 class="text-3xl font-black text-gray-800" id="stat-verified">--</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-500">
          <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Data Geo-Location</p>
          <h3 class="text-3xl font-black text-gray-800" id="stat-geo">--</h3>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div class="relative w-full md:w-96">
            <input type="text" id="searchInput" onkeyup="searchTable()" class="w-full pl-12 pr-4 py-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-masjidGreen outline-none text-sm" placeholder="Cari Nama atau No. IC...">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300 absolute left-4 top-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <button onclick="exportToExcel()" class="bg-masjidGreen text-white px-6 py-4 rounded-2xl text-xs font-bold uppercase tracking-widest shadow-lg hover:bg-masjidDark transition w-full md:w-auto">
            Muat Turun Excel
        </button>
      </div>

      <!-- Table Card -->
      <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse" id="adminTable">
            <thead class="bg-gray-50 text-gray-400 uppercase text-[10px] font-bold tracking-[0.2em] border-b">
              <tr>
                <th class="px-6 py-4">Tarikh / Nama / IC</th>
                <th class="px-6 py-4">Hubungi / Bil Air</th>
                <th class="px-6 py-4">Alamat / Lot</th>
                <th class="px-6 py-4 text-center">Lokasi</th>
                <th class="px-6 py-4 text-right">Tindakan</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 text-sm" id="tableBody">
                <!-- Loading State -->
                <tr>
                    <td colspan="5" class="px-6 py-20 text-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-masjidGreen mx-auto mb-4"></div>
                        <p class="text-gray-400 font-bold animate-pulse uppercase text-[10px] tracking-widest">Memuat Turun Data Dari Google Sheets...</p>
                    </td>
                </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal Detail Ahli -->
    <div id="memberModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-masjidGreen p-6 text-white flex justify-between items-center">
                <h3 class="font-bold uppercase tracking-widest text-sm">Semakan Detail Kariah</h3>
                <button onclick="closeModal()" class="text-white/50 hover:text-white">✕</button>
            </div>
            <div class="p-8 space-y-4" id="modalContent">
                <!-- Content Injected via JS -->
            </div>
            <div class="p-6 bg-gray-50 flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-3 bg-gray-200 text-gray-600 rounded-xl font-bold uppercase text-[10px]">Tutup</button>
                <button onclick="printRecord()" class="flex-1 py-3 bg-masjidGold text-masjidGreen rounded-xl font-bold uppercase text-[10px]">Cetak Rekod</button>
            </div>
        </div>
    </div>

    <footer class="mt-20 py-10 text-center">
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em]">Hak Cipta Terpelihara &copy; 2026 MKSLB</p>
    </footer>

    <script>
      // Sila tukar URL ini kepada URL 'doGet' GAS anda
      const scriptURL = 'https://script.google.com/macros/s/AKfycbzV8lhqZ_Ij_tK92MVbYaorq8iQ1wvMQIGNZLzLoALiV7Rn75DoBVnzwwktv6UO7_kYug/exec';

      let allData = [];

      // Ambil Data dari Google Sheets (Memerlukan doGet(e) di Apps Script)
      async function fetchData() {
        try {
          const response = await fetch(scriptURL + '?action=read');
          const data = await response.json();
          allData = data.slice(1); // Buang header row
          renderTable(allData);
          updateStats(allData);
        } catch (error) {
          console.error("Gagal ambil data:", error);
          // Paparan contoh jika fetch gagal (untuk tujuan demo UI)
          document.getElementById('tableBody').innerHTML = `
            <tr>
                <td colspan="5" class="px-6 py-10 text-center text-red-500 font-bold">
                    Gagal menyambung ke database. Sila pastikan 'doGet' telah dikemaskini di GAS.
                </td>
            </tr>`;
        }
      }

      function updateStats(data) {
          document.getElementById('stat-total').innerText = data.length;
          document.getElementById('stat-verified').innerText = data.length; // Anda boleh tambah filter status jika perlu
          document.getElementById('stat-geo').innerText = data.filter(d => d[6] && d[7]).length;
      }

      function renderTable(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        data.forEach((row, index) => {
          const tr = document.createElement('tr');
          tr.className = "hover:bg-green-50/50 transition cursor-pointer";
          
          // Row format: [Timestamp, Nama, IC, Tel, Alamat, Lot, Lat, Lng, BilAir]
          tr.innerHTML = `
            <td class="px-6 py-5">
                <div class="text-[9px] text-gray-400 mb-1 font-mono">${new Date(row[0]).toLocaleDateString('ms-MY')}</div>
                <div class="font-bold text-gray-800 uppercase">${row[1]}</div>
                <div class="text-[11px] text-gray-500 font-mono">${row[2]}</div>
            </td>
            <td class="px-6 py-5">
                <div class="font-bold text-masjidGreen">${row[3]}</div>
                <div class="text-[10px] text-gray-400">Air: ${row[8]}</div>
            </td>
            <td class="px-6 py-5">
                <div class="text-[11px] font-medium text-gray-600 line-clamp-1 max-w-[200px]">${row[4]}</div>
                <div class="text-[10px] font-bold text-masjidGold uppercase">${row[5]}</div>
            </td>
            <td class="px-6 py-5 text-center">
                ${row[6] ? 
                  `<a href="https://www.google.com/maps?q=${row[6]},${row[7]}" target="_blank" class="inline-block p-2 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                  </a>` : '<span class="text-gray-300">-</span>'}
            </td>
            <td class="px-6 py-5 text-right">
                <button onclick="viewDetails(${index})" class="text-[10px] font-bold bg-gray-100 hover:bg-masjidGreen hover:text-white px-4 py-2 rounded-lg transition uppercase tracking-widest">Detail</button>
            </td>
          `;
          tableBody.appendChild(tr);
        });
      }

      function searchTable() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allData.filter(row => 
            row[1].toLowerCase().includes(input) || row[2].includes(input)
        );
        renderTable(filtered);
      }

      function viewDetails(index) {
          const row = allData[index];
          const content = `
            <div class="space-y-4">
                <div class="bg-gray-50 p-4 rounded-2xl">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Nama Penuh</p>
                    <p class="font-bold text-gray-800 uppercase text-sm">${row[1]}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">No. IC</p>
                        <p class="font-bold text-gray-800 text-sm">${row[2]}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Telefon</p>
                        <p class="font-bold text-gray-800 text-sm">${row[3]}</p>
                    </div>
                </div>
                <div class="bg-gray-50 p-4 rounded-2xl">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Alamat Penuh</p>
                    <p class="font-medium text-gray-700 text-xs">${row[4]}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">No. Lot JUPEM</p>
                        <p class="font-bold text-gray-800 text-sm">${row[5]}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Akaun Bil Air</p>
                        <p class="font-bold text-gray-800 text-sm">${row[8]}</p>
                    </div>
                </div>
            </div>
          `;
          document.getElementById('modalContent').innerHTML = content;
          document.getElementById('memberModal').classList.remove('hidden');
      }

      function closeModal() {
          document.getElementById('memberModal').classList.add('hidden');
      }

      // Jalankan fungsi fetch bila page load
      window.onload = fetchData;

    </script>
  </body>
</html>
