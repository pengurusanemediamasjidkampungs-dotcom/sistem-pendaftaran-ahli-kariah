<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Ahli Kariah - MKSLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              masjidGreen: '#006400',
              masjidGold: '#FFD700',
              masjidDark: '#004d00',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
      body { font-family: 'Poppins', sans-serif; }
      .step-hidden { display: none; }
      .step-active { display: block; animation: fadeIn 0.4s ease-out; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white text-masjidGreen p-4 shadow-sm border-b border-gray-100 sticky top-0 z-50">
      <div class="container mx-auto flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-3">
          <img src="logo_masjid.png" alt="MKSLB" class="h-10 w-auto" onerror="this.src='https://via.placeholder.com/40x40?text=MKSLB'">
          <span class="font-bold text-sm md:text-base">MKSLB - Pendaftaran</span>
        </a>
        <a href="https://mkslb.com" class="text-xs font-bold hover:text-masjidGold transition uppercase tracking-widest">Kembali ke mkslb.com</a>
      </div>
    </nav>

    <main class="container mx-auto mt-6 p-4 max-w-2xl">
      <!-- Progress Bar -->
      <div class="mb-8">
        <div class="flex justify-between mb-2">
          <span class="text-xs font-bold text-masjidGreen uppercase tracking-wider" id="step-indicator">Langkah 1: Maklumat Peribadi</span>
          <span class="text-xs font-bold text-gray-400" id="step-count">1 / 3</span>
        </div>
        <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
          <div class="bg-masjidGreen h-full transition-all duration-500" id="progress-bar" style="width: 33.33%"></div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <form id="multi-step-form" class="p-6 md:p-8">
          
          <!-- Step 1: Maklumat Peribadi -->
          <div id="step-1" class="step-active space-y-6">
            <h3 class="text-xl font-bold text-masjidGreen border-b pb-2">Maklumat Peribadi</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Penuh (Seperti dalam IC)</label>
                <input type="text" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-masjidGreen outline-none uppercase" placeholder="AHMAD BIN ALI" required>
              </div>
              <div class="grid md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1">No. Kad Pengenalan</label>
                  <input type="text" id="ic_no" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-masjidGreen outline-none" placeholder="880101015541" maxlength="12" pattern="\d{12}" required>
                  <p class="text-[10px] text-gray-400 mt-1">*12 digit tanpa sempang (-)</p>
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1">No. Telefon</label>
                  <input type="tel" id="phone_no" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-masjidGreen outline-none" placeholder="0123456789" required>
                </div>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">No. Pendaftaran Bil Air (MKSLB Kredibiliti)</label>
                <input type="text" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-masjidGreen outline-none" placeholder="Contoh: 123456789" required>
              </div>
            </div>
            <div class="pt-4">
              <button type="button" onclick="nextStep(2)" class="w-full bg-masjidGreen text-white font-bold py-4 rounded-xl shadow-lg hover:bg-masjidDark transition">Seterusnya: Maklumat Keluarga</button>
            </div>
          </div>

          <!-- Step 2: Maklumat Keluarga -->
          <div id="step-2" class="step-hidden space-y-6">
            <h3 class="text-xl font-bold text-masjidGreen border-b pb-2">Maklumat Keluarga & Kediaman</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat Kediaman (Zon Kariah)</label>
                <textarea rows="3" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-masjidGreen outline-none" placeholder="No. 12, Jalan Utama, Kampung Sungai Lang Baru..."></textarea>
              </div>
              
              <div class="p-4 bg-green-50 rounded-xl border border-green-100">
                <p class="text-sm font-bold text-masjidGreen mb-2 flex items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                  </svg>
                  Lokasi Rumah (GPS)
                </p>
                <button type="button" class="bg-white border border-masjidGreen text-masjidGreen text-xs font-bold py-2 px-4 rounded-lg hover:bg-masjidGreen hover:text-white transition">Pin Lokasi Saya (Google Maps)</button>
                <p class="text-[10px] text-gray-500 mt-2">Ini membantu pihak masjid melakukan ziarah kebajikan.</p>
              </div>

              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Jumlah Tanggungan (Anak/Isteri)</label>
                <input type="number" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-masjidGreen outline-none" placeholder="0">
              </div>
            </div>
            <div class="pt-4 flex gap-3">
              <button type="button" onclick="nextStep(1)" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-xl">Kembali</button>
              <button type="button" onclick="nextStep(3)" class="flex-2 bg-masjidGreen text-white font-bold py-4 px-8 rounded-xl shadow-lg hover:bg-masjidDark transition">Seterusnya: Dokumen</button>
            </div>
          </div>

          <!-- Step 3: Dokumen & Pengesahan -->
          <div id="step-3" class="step-hidden space-y-6">
            <h3 class="text-xl font-bold text-masjidGreen border-b pb-2">Muat Naik & Pengesahan</h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Gambar Kad Pengenalan (Depan)</label>
                <input type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-masjidGreen hover:file:bg-green-100">
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Bukti Alamat (Bil Air/Elektrik)</label>
                <input type="file" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-masjidGreen hover:file:bg-green-100">
              </div>

              <div class="pt-4 p-4 bg-gray-50 rounded-xl border border-gray-200">
                <label class="flex items-start gap-3 cursor-pointer">
                  <input type="checkbox" class="mt-1 w-5 h-5 text-masjidGreen rounded focus:ring-masjidGreen" required>
                  <span class="text-xs text-gray-600 leading-relaxed">
                    Saya dengan ini bersetuju memberikan maklumat ini untuk kegunaan pihak <strong>Masjid Kampung Sungai Lang Baru (MKSLB)</strong> sahaja bagi tujuan pengurusan kariah mengikut <strong>Akta Perlindungan Data Peribadi (PDPA)</strong>.
                  </span>
                </label>
              </div>
            </div>
            <div class="pt-4 flex gap-3">
              <button type="button" onclick="nextStep(2)" class="flex-1 bg-gray-100 text-gray-600 font-bold py-4 rounded-xl">Kembali</button>
              <button type="submit" class="flex-2 bg-masjidGold text-masjidGreen font-extrabold py-4 px-8 rounded-xl shadow-lg hover:scale-105 transition">Hantar & Sahkan</button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <script>
      function nextStep(step) {
        // Validation for Step 1
        if (step === 2) {
          const ic = document.getElementById('ic_no').value;
          if (ic.length !== 12) {
            alert('Sila masukkan 12 digit No. Kad Pengenalan yang sah.');
            return;
          }
        }

        // UI Updates
        document.querySelectorAll('[id^="step-"]').forEach(el => el.classList.replace('step-active', 'step-hidden'));
        document.getElementById('step-' + step).classList.replace('step-hidden', 'step-active');
        
        const indicators = ["Maklumat Peribadi", "Maklumat Keluarga", "Muat Naik & PDPA"];
        document.getElementById('step-indicator').innerText = "Langkah " + step + ": " + indicators[step-1];
        document.getElementById('step-count').innerText = step + " / 3";
        document.getElementById('progress-bar').style.width = (step / 3 * 100) + "%";
        
        window.scrollTo(0, 0);
      }

      document.getElementById('multi-step-form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Terima kasih! Pendaftaran anda telah diterima. Nazir akan menyemak maklumat anda dalam tempoh 48 jam.');
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
